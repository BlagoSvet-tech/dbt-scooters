version: 2

sources:
  - name: "scooters_raw"
    description: "Raw data provided by scooters service"
    loader: "https://t.me/inzhenerka_dbt_bot"
    tables:
      - name: "trips"
        description: "Scooter trips"

      - name: "users"
        description: "Users of scooter service"

models:
  - name: trips_prep
    description: "Trips for analysis"
    config:
      materialized: view

  - name: trips_stat
    description: "Overall trips statistics"

  - name: trips_stat_daily
    description: "Trips statistics by day"
    config:
      indexes:
        - columns: ["date"]

  - name: trips_age_daily
    description: "Statistics by age and start date"

  - name: trips_age_daily_stat
    description: "Statistics by age"